<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskHub - Pokeapi</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <script src="auth.js"></script>

    <div id="header"></div>

    <main class="dashboard">
        <div class="container">
            <h2>Pokeapi</h2>
            <p>¡Bienvenido a la sección de Pokeapi! Aquí podrás descubrir información sobre tus Pokémon favoritos.</p>


            <input type="text" id="searchName" placeholder="Buscar por nombre">
            <input type="number" id="searchId" placeholder="Buscar por ID">
            <select id="searchType">
                <option value="">Todos los tipos</option>
            </select>


            <div id="pokemonContainer"></div>

    </main>
    <div id="footer"></div>
    <script src="layout.js"></script>

    <script>

        let allPokemon = [];

        async function getAllPokemon() {

            const response = await fetch("https://pokeapi.co/api/v2/pokemon?limit=151");
            const data = await response.json();

            const pokemonDetails = await Promise.all(
                data.results.map(pokemon =>
                    fetch(pokemon.url).then(res => res.json())
                )
            );

            allPokemon = pokemonDetails;

            displayPokemon(allPokemon);
            loadTypes();
        }

        function displayPokemon(pokemons) {

            const container = document.getElementById("pokemonContainer");
            container.innerHTML = "";

            pokemons.forEach(pokemon => {

                const types = pokemon.types
                    .map(t => t.type.name)
                    .join(", ");

                const card = document.createElement("div");
                card.classList.add("pokemon-card");

                card.innerHTML = `
            <p>#${pokemon.id}</p>
            <h4>${pokemon.name}</h4>
            <img src="${pokemon.sprites.front_default}">
            <p class="pokemon-type">${types}</p>
        `;

                container.appendChild(card);

            });

        }

        function filterPokemon() {

            const name = document.getElementById("searchName").value.toLowerCase();
            const id = document.getElementById("searchId").value;
            const type = document.getElementById("searchType").value;

            const filtered = allPokemon.filter(pokemon => {

                const matchName = pokemon.name.includes(name);
                const matchId = id === "" || pokemon.id == id;

                const matchType =
                    type === "" ||
                    pokemon.types.some(t => t.type.name === type);

                return matchName && matchId && matchType;

            });

            displayPokemon(filtered);
        }

        async function loadTypes() {

            const response = await fetch("https://pokeapi.co/api/v2/type");
            const data = await response.json();

            const select = document.getElementById("searchType");

            data.results.forEach(type => {

                const option = document.createElement("option");
                option.value = type.name;
                option.textContent = type.name;

                select.appendChild(option);

            });

        }

        document.getElementById("searchName").addEventListener("input", filterPokemon);
        document.getElementById("searchId").addEventListener("input", filterPokemon);
        document.getElementById("searchType").addEventListener("change", filterPokemon);

        getAllPokemon();

    </script>



</body>

</html>
