<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskHub Battle Simulator</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <header class="navbar">
        <h2>TaskHub</h2>
        <p>Pokémon Battle Simulator</p>
    </header>

    <script src="auth.js"></script>

    <div id="header"></div>

    <main class="container">

        <datalist id="pokemon-list"></datalist>

        <!-- SELECTION SCREEN -->

        <section id="selection-screen" class="screen active">

            <div class="card">

                <h1>Simular batalla</h1>

                <p class="subtitle">
                    Selecciona dos Pokémon para ejecutar la simulación
                </p>

                <div class="inputs">

                    <input type="text" id="poke1-input" list="pokemon-list" placeholder="Pokémon 1 (ej. pikachu)">

                    <span class="vs">VS</span>

                    <input type="text" id="poke2-input" list="pokemon-list" placeholder="Pokémon 2 (ej. charizard)">

                </div>

                <button class="primary-btn" onclick="iniciarBatalla()">
                    Iniciar simulación
                </button>

                <p id="error-msg" class="error"></p>

            </div>

        </section>

        <!-- BATTLE SCREEN -->

        <section id="battle-screen" class="screen">

            <div class="arena">

                <div class="pokemon-card" id="card-p1">

                    <h3 id="p1-name">Pokemon 1</h3>

                    <img id="p1-img" src="" alt="Pokemon 1">

                    <div class="hp-bar-container">
                        <div id="p1-hp-bar" class="hp-bar"></div>
                    </div>

                    <p class="hp-text">HP: <span id="p1-hp-text">100</span>%</p>

                </div>

                <div id="narrator-box">

                    <h3 id="narrator-text">
                        Preparando combate...
                    </h3>

                </div>

                <div class="pokemon-card" id="card-p2">

                    <h3 id="p2-name">Pokemon 2</h3>

                    <img id="p2-img" src="" alt="Pokemon 2">

                    <div class="hp-bar-container">
                        <div id="p2-hp-bar" class="hp-bar"></div>
                    </div>

                    <p class="hp-text">HP: <span id="p2-hp-text">100</span>%</p>

                </div>

            </div>

            <div id="battle-log" class="card">

                <h3>Historial de acciones</h3>

                <ul id="log-list"></ul>

            </div>

        </section>

        <!-- WINNER SCREEN -->

        <section id="winner-screen" class="screen">

            <div class="card winner">

                <h1>Resultado</h1>

                <h2 id="winner-name"></h2>

                <img id="winner-img" src="" alt="Ganador">

                <button class="primary-btn" onclick="location.reload()">
                    Simular otra batalla
                </button>

            </div>

        </section>

    </main>

    <script src="script.js"></script>
    <div id="footer"></div>
    <script src="layout.js"></script>

</body>

</html>
